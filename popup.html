<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root, body.theme-light {
      --bg-color: #ffffff;
      --text-color: #1c1e21;
      --border-color: #dddfe2;
      --primary-color: #0866ff;
      --primary-hover: #0055d4;
      --hint-color: #65676b;
      --input-bg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      body:not(.theme-light) {
        --bg-color: #18191a;
        --text-color: #e4e6eb;
        --border-color: #3e4042;
        --primary-color: #2374e1;
        --primary-hover: #3a85eb;
        --hint-color: #b0b3b8;
        --input-bg: #242526;
      }
    }

    body.theme-dark {
      --bg-color: #18191a;
      --text-color: #e4e6eb;
      --border-color: #3e4042;
      --primary-color: #2374e1;
      --primary-hover: #3a85eb;
      --hint-color: #b0b3b8;
      --input-bg: #242526;
    }

    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      transition: background-color 0.2s, color 0.2s;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      color: var(--primary-color);
    }
    select {
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input[type="number"], 
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }
    textarea {
      height: 60px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > div {
      flex: 1;
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-color);
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    .hint {
      font-size: 11px;
      color: var(--hint-color);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h2>FaceDong Filter</h2>
    <select id="themeSelect">
      <option value="auto">Auto Theme</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>
  
  <div class="field">
    <div class="toggle">
      <label for="enabled">Enable Filter</label>
      <input type="checkbox" id="enabled" checked>
    </div>
  </div>

  <div class="field">
    <label>Price Range (Millions VND)</label>
    <div class="row">
      <div>
        <input type="number" id="minPrice" placeholder="Min" step="0.5">
        <div class="hint">e.g. 5</div>
      </div>
      <div>
        <input type="number" id="maxPrice" placeholder="Max" step="0.5">
        <div class="hint">e.g. 15</div>
      </div>
    </div>
  </div>

  <div class="field">
    <label for="excludeKeywords">Exclude Keywords</label>
    <textarea id="excludeKeywords" placeholder='"studio", CT1, chung cư...'></textarea>
    <div class="hint">Comma separated</div>
  </div>

  <div class="field">
    <label for="includeKeywords">Required Keywords</label>
    <textarea id="includeKeywords" placeholder='"2PN", view biển...'></textarea>
    <div class="hint">Leave empty if not needed</div>
  </div>

  <button id="save">Save & Apply</button>
  <button id="clearCache" style="background-color: var(--border-color); color: var(--text-color); margin-top: 10px;">Clear Cache</button>

  <script src="popup.js"></script>
</body>
</html>
